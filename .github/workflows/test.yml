name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Go ${{ matrix.go-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        go-version: ["1.22.x", "1.23.x"]
        os: [ubuntu-latest, macos-latest]
        # Go 1.22 test binaries are incompatible with current macOS dyld.
        exclude:
          - go-version: "1.22.x"
            os: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Build dev-tools
        run: go build -o dev-tools .

      - name: Run tests
        run: ./dev-tools test

      - name: Run tests with coverage
        run: ./dev-tools test:coverage
