commands:
  dev-logs:
    - run: "tail -n 50 activity.log"

  test-daemon:
    - run: "echo toot && sleep 10"
      daemon: true

  test-service:
    - run: "sleep 2 && docker ps"
    - start_services: [ "sleep" ]

  alpine:
    - run: "docker ps"
    - start_services:
        - box:
            image: alpine
            volumes: ["./:/data"]
            ports: ["5432:127.0.0.1:5432"]

  alpine-redis:
    - run: "docker ps"
    - start_services:
        - box:
            image: alpine
            command: "sleep infinity"
            volumes: ["./:/data"]
            ports: ["5432:127.0.0.1:5432"]
        - cache:
            image: redis

  test-directory:
    - run: "pwd && ls -la"
      directory: "cmd"

  test-daemon-with-directory:
    - run: "echo 'Running in:' && pwd && sleep 5"
      daemon: true
      directory: "cmd"
  test-realtime:
    - run: "echo Starting... && sleep 1 && echo Middle... && sleep 1 && echo Done!"

  test-background-daemon:
    - run: "sleep 30"
      background: true
      daemon: true

  test-failing:
    - run: "echo This command will fail && exit 42"
